# infra/docker-compose.yml
version: '3.9'

services:

  # ─── PostgreSQL 16 ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: barbershop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: barbershop_dev
      POSTGRES_USER: barber_user
      POSTGRES_PASSWORD: barber_secret_2025
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U barber_user -d barbershop_dev']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - barbershop_network

  # ─── Redis 7 ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: barbershop_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass redis_secret_2025
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis_secret_2025', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - barbershop_network

  # ─── MinIO (stockage S3-compatible) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: barbershop_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret_2025
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'   # API S3
      - '9001:9001'   # Console web
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - barbershop_network

  # ─── MailHog (emails dev) ─────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: barbershop_mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - barbershop_network

  # ─── Adminer (UI PostgreSQL) ──────────────────────────
  adminer:
    image: adminer:latest
    container_name: barbershop_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - barbershop_network

  # ─── RedisInsight (UI Redis) ──────────────────────────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: barbershop_redis_ui
    restart: unless-stopped
    ports:
      - '5540:5540'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - barbershop_network

# ─── Volumes persistants ──────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ─── Réseau interne ───────────────────────────────────
networks:
  barbershop_network:
    driver: bridge
    name: barbershop_network